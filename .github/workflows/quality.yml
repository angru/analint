name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen --group dev
      - uses: j178/prek-action@v2
        with:
          prek-version: "0.4.4"
      - run: uv run --frozen pytest
