# Example intent manifest (P4.0c, research/26).
#
# One entry per directory under examples/ that contains a spec.py. Each entry
# records the INTENDED outcome of `analint check examples/<name>` so that a
# behavioural regression is caught separately from the characterization snapshot
# (tests/snapshots/examples.json keeps the exact graph/state details; this file
# keeps the human-meaningful verdict).
#
# Fields:
#   verdict           — expected effective verdict: "PASS" | "FAIL" | "INCONCLUSIVE"
#   exit_code         — expected CLI exit code (PASS=0, FAIL=1, load-error=3, INCONCLUSIVE=4)
#   broken            — true if the example is DELIBERATELY red (a teaching/demo failure)
#   failed_scenarios  — scenario ids expected to fail (Expect.FAIL scenarios PASS, so are NOT listed)
#   failed_queries    — query ids expected to report FAIL
#   failed_invariants — invariant ids expected to report FAIL
#   failed_flows      — flow ids expected to fail
#   warning_locations — sorted, de-duplicated locations of expected WARNING findings
#   source            — external system / research reference, if any
#
# When this file and the checker disagree, do NOT bless the new output: either fix
# a regression, or update this entry with a reviewed explanation.

