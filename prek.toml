minimum_prek_version = "0.4.4"

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "check-added-large-files" },
    { id = "check-case-conflict" },
    { id = "check-merge-conflict" },
    { id = "check-toml" },
    { id = "check-yaml" },
    { id = "detect-private-key" },
    { id = "end-of-file-fixer" },
    { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-check"
name = "ruff check"
entry = "uv run --frozen ruff check --fix"
language = "system"
types = ["python"]

[[repos.hooks]]
id = "ruff-format"
name = "ruff format"
entry = "uv run --frozen ruff format"
language = "system"
types = ["python"]

[[repos.hooks]]
id = "ty"
name = "ty check"
entry = "uv run --frozen ty check"
language = "system"
pass_filenames = false

[[repos.hooks]]
id = "pytest"
name = "pytest"
entry = "uv run --frozen pytest"
language = "system"
pass_filenames = false
stages = ["pre-push"]
